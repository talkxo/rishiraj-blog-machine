# Site settings
title: "rishi raj's blog"
description: >
  On marketing, tech, and building a services co.

author: Rishi Raj
email: r@rishi.im
username: Rishi Raj

baseurl: "" # the subpath of your site, e.g. /blog
url: "https://rishiraj.blog" # the base hostname & protocol for your site

# Build settings
include: [_pages]
markdown: kramdown
permalink: /:year/:title
future: false

# Performance settings
compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: []

# Cache and compression settings
keep_files: [assets, images, favicons]
exclude: [vendor, node_modules, .git, .gitignore, README.md, Gemfile, Gemfile.lock]

sass:
  style: compressed

# Plugins:
plugins:
  - jekyll-sitemap
  - jekyll-feed
