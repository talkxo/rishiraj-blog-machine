<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="language" content="en">
  <meta name="geo.region" content="IN">
  <meta name="geo.placename" content="India">
  <meta name="distribution" content="global">
  <meta name="rating" content="general">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
  <meta http-equiv="Cache-Control" content="public, max-age=3600">
  <meta name="format-detection" content="telephone=no">
  <meta http-equiv="Expires" content="3600">
  <meta name="theme-color" content="#00A36C">
  <meta name="msapplication-TileColor" content="#00A36C">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

  <!-- Favicon -->
  {% include favicons.html %}

  <!-- Meta information -->
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description"
        content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="canonical"
        href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:image" content="{% if page.image %}{{ page.image | prepend: site.url }}{% else %}{{ site.url }}/assets/images/workspace-hero.webp{% endif %}">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:locale" content="en_US">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">
  <meta property="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="twitter:description" content="{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta property="twitter:image" content="{% if page.image %}{{ page.image | prepend: site.url }}{% else %}{{ site.url }}/assets/images/workspace-hero.webp{% endif %}">
  <meta property="twitter:creator" content="@rishiraj">

  <!-- Article specific meta tags -->
  {% if page.layout == 'post' %}
  <meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">
  <meta property="article:author" content="{{ site.author }}">
  <meta property="article:section" content="{% if page.categories %}{{ page.categories | first }}{% else %}General{% endif %}">
  {% if page.tags %}
  {% for tag in page.tags %}
  <meta property="article:tag" content="{{ tag }}">
  {% endfor %}
  {% endif %}
  {% endif %}

  <!-- Open search scheme -->
  <link rel="search"
        type="application/opensearchdescription+xml"
        title="rishi raj's blog"
        href="{{ "/opensearch.xml" | prepend: site.baseurl }}" />

  <!-- Feed -->
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}"
        href="{{ "/feed.xml" | prepend: site.baseurl }}" />

  <!-- Structured Data: WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "{{ site.title }}",
    "description": "{{ site.description }}",
    "url": "{{ site.url }}",
    "author": {
      "@type": "Person",
      "name": "{{ site.author }}",
      "url": "{{ site.url }}/rishi-raj/"
    }
  }
  </script>

  {% if page.layout == 'post' %}
  <!-- Structured Data: BlogPosting -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{ page.title }}",
    "description": "{% if page.description %}{{ page.description | strip_html | strip_newlines | truncate: 160 }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}",
    "image": "{% if page.image %}{{ page.image | prepend: site.url }}{% else %}{{ site.url }}/assets/images/workspace-hero.webp{% endif %}",
    "author": {
      "@type": "Person",
      "name": "{{ site.author }}",
      "url": "{{ site.url }}/rishi-raj/"
    },
    "publisher": {
      "@type": "Organization",
      "name": "{{ site.title }}",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ site.url }}/assets/images/favicons/favicon-96x96.png"
      }
    },
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}"
    },
    "wordCount": "{{ page.content | number_of_words }}"
  }
  </script>

  <!-- Structured Data: BreadcrumbList -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Home",
        "item": "{{ site.url }}"
      },
      {
        "@type": "ListItem",
        "position": 2,
        "name": "{{ page.title }}",
        "item": "{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}"
      }
    ]
  }
  </script>
  {% endif %}

  <!-- Preload critical resources -->
  <link rel="preload" href="{{ "/css/main.css" | prepend: site.baseurl }}" as="style">

  <!-- Google Fonts - Work Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;700&display=swap">

  <style>
    :root {
      font-size: 112.5%;
      --color-bg: #ffffff;
      --color-text: #222222;
      --color-muted: #222222;
      --color-ink: #222222;
      --color-border: #e5e7eb;
      --color-accent: #00A36C;
      --code-bg: rgba(27,31,35,.05);
      --link-hover-text: #ffffff;
      --card-fixed-height: 180px;
    }
    html[data-theme="dark"] {
      --color-bg: #0b0f14;
      --color-text: #f9fafb;
      --color-muted: #f9fafb;
      --color-ink: #f9fafb;
      --color-border: #273241;
      --color-accent: #00A36C;
      --code-bg: rgba(240,246,252,0.05);
      --link-hover-text: #ffffff;
    }
    body {
      font-family: 'Work Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 400;
      font-size: 1rem;
      line-height: 1.77778;
      margin: 0;
      padding: 0;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    h1, h2, h3, h4, h5, h6 {
      font-weight: 500;
      line-height: 1.2;
    }
    code, pre {
      font-family: 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Consolas, 'Courier New', monospace;
    }
    .u-container {
      max-width: 38rem;
      margin: 0 auto;
      padding: 6rem 1rem 1rem;
      flex: 1;
      min-height: 0;
    }
    .c-page__subtitle {
      font-size: 2.7rem;
      line-height: 1;
      margin-bottom: 2.5rem;
      max-width: 100%;
      word-break: break-word;
      font-weight: 700;
      color: var(--color-ink);
    }
  </style>

  <link rel="stylesheet" href="{{ "/css/main.css" | prepend: site.baseurl }}">

  <!-- Analytics -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="68611632-aaf7-4a9a-8d24-e808927acf86"></script>
</head>
