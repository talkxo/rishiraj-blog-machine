<!DOCTYPE html>
<html lang="en">
  {% include head.html %}

  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <main id="main-content" class="u-container">
      {{ content }}
    </main>
    <!-- Deferred scripts -->
    <script defer>
      // Service Worker Registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('SW registered: ', registration);
            })
            .catch(function(registrationError) {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
    <script defer>
      // Font Loading Observer for LCP optimization
      window.addEventListener('load', function() {
        if ('fonts' in document) {
          Promise.all([
            document.fonts.load('400 1em "Work Sans"'),
            document.fonts.load('700 1em "Work Sans"')
          ]).then(function() {
            document.documentElement.classList.add('fonts-loaded');
            console.log('Critical fonts loaded');
          }).catch(function() {
            console.log('Font loading failed, using fallbacks');
          });
        }
      });
    </script>
    <script defer>
      // Core Web Vitals Monitoring
      window.addEventListener('load', function() {
        if ('PerformanceObserver' in window) {
          // LCP
          new PerformanceObserver((list) => {
            const entries = list.getEntries();
            const lastEntry = entries[entries.length - 1];
            console.log('LCP:', lastEntry.startTime);
          }).observe({entryTypes: ['largest-contentful-paint']});
          
          // FID
          new PerformanceObserver((list) => {
            const entries = list.getEntries();
            entries.forEach((entry) => {
              console.log('FID:', entry.processingStart - entry.startTime);
            });
          }).observe({entryTypes: ['first-input']});
          
          // CLS
          new PerformanceObserver((list) => {
            let cls = 0;
            const entries = list.getEntries();
            entries.forEach((entry) => {
              if (!entry.hadRecentInput) {
                cls += entry.value;
              }
            });
            console.log('CLS:', cls);
          }).observe({entryTypes: ['layout-shift']});
        }
      });
    </script>
    <script defer>
      // ── 1. Reading Progress Bar ─────────────────────────────────────────
      (function() {
        const bar = document.createElement('div');
        bar.className = 'c-progress-bar';
        document.body.prepend(bar);

        function updateProgress() {
          const scrollTop = window.scrollY;
          const docHeight = document.documentElement.scrollHeight - window.innerHeight;
          const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
          bar.style.width = pct.toFixed(2) + '%';
        }

        window.addEventListener('scroll', updateProgress, { passive: true });
        updateProgress();
      })();

      // ── 2. Scroll-triggered Fade-in ─────────────────────────────────────
      (function() {
        const targets = document.querySelectorAll('.c-archives__item, .c-card');
        if (!targets.length || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

        targets.forEach(el => el.classList.add('js-fade-in'));

        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry, i) => {
            if (entry.isIntersecting) {
              // Stagger delay based on position in list
              entry.target.style.transitionDelay = (i * 0.04) + 's';
              entry.target.classList.add('is-visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1 });

        targets.forEach(el => observer.observe(el));
      })();

      // ── 3. Animated HR dots ─────────────────────────────────────────────
      (function() {
        const article = document.querySelector('.c-article__main');
        if (!article) return;

        article.querySelectorAll('hr').forEach(hr => {
          const dots = document.createElement('div');
          dots.className = 'c-hr-dots';
          dots.innerHTML = '<span></span><span></span><span></span>';
          dots.setAttribute('aria-hidden', 'true');
          hr.replaceWith(dots);
        });
      })();

      // ── 4. Active Reading Position Indicator ────────────────────────────
      (function() {
        const track = document.getElementById('reading-track');
        const thumb = document.getElementById('reading-thumb');
        const article = document.querySelector('.c-article__main');
        if (!track || !thumb || !article) return;

        function updateTrack() {
          const rect = article.getBoundingClientRect();
          const articleTop = rect.top + window.scrollY;
          const articleHeight = article.offsetHeight;
          const scrolled = window.scrollY + window.innerHeight / 2;
          const progress = Math.max(0, Math.min(1, (scrolled - articleTop) / articleHeight));

          // Show track only while inside the article
          const inView = window.scrollY > articleTop - 200 &&
                         window.scrollY < articleTop + articleHeight;
          track.classList.toggle('is-active', inView);

          // Move thumb (stays within the 80px track height, minus thumb 24px)
          thumb.style.top = (progress * (80 - 24)) + 'px';
        }

        window.addEventListener('scroll', updateTrack, { passive: true });
        updateTrack();
      })();

      // ── 5. Typing cursor — handled purely in CSS via ::after ─────────────
      // (No JS needed — the .c-site-title-cursor class drives it via CSS animation)

      // ── 6. Magnetic Nav Links ───────────────────────────────────────────
      (function() {
        const navLinks = document.querySelectorAll('.c-page__header nav a');
        const STRENGTH = 0.35; // how strongly links follow the mouse

        navLinks.forEach(link => {
          link.addEventListener('mousemove', function(e) {
            const rect = link.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const dx = (e.clientX - cx) * STRENGTH;
            const dy = (e.clientY - cy) * STRENGTH;
            link.style.transform = `translate(${dx}px, ${dy}px)`;
          });

          link.addEventListener('mouseleave', function() {
            link.style.transform = 'translate(0, 0)';
          });
        });
      })();

      // ── 7. Ink-blot Page Transition ─────────────────────────────────────
      (function() {
        const blot = document.createElement('div');
        blot.className = 'c-ink-blot';
        document.body.appendChild(blot);

        document.querySelectorAll('a[href]').forEach(link => {
          const href = link.getAttribute('href');
          // Only intercept internal same-site navigation
          if (!href || href.startsWith('#') || href.startsWith('mailto:') ||
              href.startsWith('http') || href.startsWith('//')) return;

          link.addEventListener('click', function(e) {
            e.preventDefault();
            const target = href;
            const rect = link.getBoundingClientRect();
            blot.style.left = (rect.left + rect.width / 2) + 'px';
            blot.style.top  = (rect.top  + rect.height / 2 + window.scrollY) + 'px';
            blot.style.position = 'fixed'; // follow viewport during transition

            // Trigger expansion
            requestAnimationFrame(() => {
              blot.classList.add('is-expanding');
            });

            setTimeout(() => {
              window.location.href = target;
            }, 420);
          });
        });
      })();

      // ── 8. Text Spotlight (reading highlight on scroll) ─────────────────
      (function() {
        const body = document.querySelector('.c-article__body');
        if (!body || window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

        const paragraphs = Array.from(body.querySelectorAll('p'));
        if (paragraphs.length < 4) return; // not worth it for short posts

        let spotlightEnabled = false;
        let ticking = false;

        function getActiveParagraph() {
          const mid = window.innerHeight * 0.45;
          let closest = null;
          let closestDist = Infinity;

          paragraphs.forEach(p => {
            const rect = p.getBoundingClientRect();
            const pMid = rect.top + rect.height / 2;
            const dist = Math.abs(pMid - mid);
            if (dist < closestDist) {
              closestDist = dist;
              closest = p;
            }
          });
          return closest;
        }

        function updateSpotlight() {
          // Enable spotlight only after scrolling a bit into the article
          const articleRect = body.getBoundingClientRect();
          const scrolledIn = articleRect.top < window.innerHeight * 0.4;
          const scrolledOut = articleRect.bottom < window.innerHeight * 0.5;

          if (scrolledIn && !scrolledOut) {
            if (!spotlightEnabled) {
              body.classList.add('has-spotlight');
              spotlightEnabled = true;
            }
            const active = getActiveParagraph();
            paragraphs.forEach(p => p.classList.remove('is-reading'));
            if (active) active.classList.add('is-reading');
          } else {
            body.classList.remove('has-spotlight');
            paragraphs.forEach(p => p.classList.remove('is-reading'));
            spotlightEnabled = false;
          }
          ticking = false;
        }

        window.addEventListener('scroll', () => {
          if (!ticking) {
            requestAnimationFrame(updateSpotlight);
            ticking = true;
          }
        }, { passive: true });
      })();
    </script>
  </body>
</html>
